<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniHub | Team Portal</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="dark-mode">

    <div id="login-screen" class="screen active">
        <div class="glass-card">
            <h1>Login Page</h1>
            <p>Please enter a valid email and password. If you do not have an account, contact an admin.</p>
            <input type="email" id="login-email" placeholder="Email">
            <input type="password" id="login-pass" placeholder="Password">
            <button id="btn-login">Enter Studio</button>
            <p id="auth-error" class="error"></p>
        </div>
    </div>

    <div id="main-app" class="screen">
        <aside class="sidebar">
            <div class="user-info">
                <img id="user-avatar" src="" alt="PFP">
                <h2 id="display-name">Artist</h2>
                <span id="user-role" class="badge">Member</span>
            </div>
            <nav>
                <button onclick="showPage('dash')">📊 Dashboard</button>
                <button onclick="showPage('chat')">💬 Team Chat</button>
                <button onclick="showPage('settings')">⚙️ Settings</button>
                <button id="admin-link" onclick="showPage('admin')" style="display:none;">🛡️ Admin</button>
            </nav>
            <button id="btn-logout" class="btn-secondary">Logout</button>
        </aside>

        <main class="content-area">
            <section id="page-dash" class="page active">
                <h1>Dashboard</h1>
                <div class="stats-row">
                    <div class="stat-card">
                        <h3>Team Status</h3>
                        <p id="announcement-text">Loading announcement...</p>
                    </div>
                </div>
            </section>

            <section id="page-chat" class="page">
                <h1>Team Chat</h1>
                <div class="chat-wrapper">
                    <div id="chat-messages"></div>
                    <div class="chat-input">
                        <input type="text" id="msg-input" placeholder="Type a message...">
                        <button id="btn-send">Send</button>
                    </div>
                </div>
            </section>

            <section id="page-settings" class="page">
                <h1>Settings</h1>
                <div class="settings-grid">
                    <div class="card">
                        <h3>Visuals</h3>
                        <button onclick="toggleTheme()">Toggle Light/Dark Mode</button>
                    </div>
                    <div class="card">
                        <h3>Profile</h3>
                        <input type="text" id="new-pfp" placeholder="New PFP Image URL">
                        <button id="btn-update-pfp">Update Avatar</button>
                    </div>
                </div>
            </section>

            <section id="page-admin" class="page">
                <h1>Admin Command</h1>
                <div class="card">
                    <h3>Global Announcement</h3>
                    <textarea id="new-announcement" placeholder="Update everyone's dashboard..."></textarea>
                    <button id="btn-push-admin">Push Update</button>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
