<main class="content">
    <section id="page-dash" class="page active">
        <h1 class="animate-slide">Studio Dashboard</h1>
        <div class="grid">
            <div class="card animate-pop">
                <h3>Scene Tracker</h3>
                <div id="scene-list">
                    </div>
            </div>
            <div class="card animate-pop" style="animation-delay: 0.1s">
                <h3>Production Note</h3>
                <p>Ensure all cache files are cleared before pushing to the render farm.</p>
            </div>
        </div>
    </section>

    <section id="page-analytics" class="page">
        <h1 class="animate-slide">Live Stats</h1>
        <div class="grid">
            <div class="card">
                <h3>Rendering Progress</h3>
                <h2 class="stat-text">88%</h2>
                <div class="progress-bar"><div class="progress" style="width: 88%"></div></div>
            </div>
        </div>
    </section>

    <section id="page-custom" class="page">
        </section>
</main>
