<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AniHub Test</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0b0e14; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #161b22; padding: 2rem; border-radius: 8px; border: 1px solid #30363d; text-align: center; }
        button { background: #79c0ff; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="box">
        <h1>Animation Hub</h1>
        <p>If you see this, the HTML is loading.</p>
        <button id="test-btn">Click for Heartbeat</button>
    </div>

    <script>
        // 2. THE LOGIC (Inside the HTML so it can't get lost)
        window.onload = () => {
            alert("SUCCESS: The script is running!");
            
            const btn = document.getElementById('test-btn');
            btn.onclick = () => {
                alert("The button is alive!");
            };
        };
    </script>
</body>
</html>
